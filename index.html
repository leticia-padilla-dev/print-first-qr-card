<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bar Jubilats Serra | Print-first poster and QR cards</title>
    <meta
      name="description"
      content="Poster promocional y tarjetas QR imprimibles para Bar Jubilats Serra, preparados para impresión A4 desde navegador."
    />
    <meta name="author" content="Leticia Padilla" />
    <script>
      (function (location) {
        if (location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map((segment) => segment.replace(/~and~/g, "&"))
            .join("?");

          window.history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
        }
      })(window.location);
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Great+Vibes&family=Pinyon+Script&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Bar Jubilats Serra | Print-first assets" />
    <meta
      property="og:description"
      content="Poster promocional y tarjetas QR imprimibles para un negocio local, preparados para A4."
    />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
